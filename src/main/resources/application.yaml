server:
  port: 8080

spring:
  application:
    name: lexilearn-be
  profiles:
    active: local

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lexilearn}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:thuunhat@gmail.com}
    password: ${MAIL_PASSWORD:xoeg mjlb gxbv kcdu}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  cors:
    # Danh sách origin FE được phép, cách nhau bởi dấu phẩy.
    # Production set qua biến môi trường CORS_ALLOWED_ORIGINS.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  otp:
    length: 6
    max-sends-per-hour: 5   # chống spam OTP
    max-verify-attempts: 5  # chống brute-force OTP

  jwt:
    # HS256 yêu cầu secret >= 32 bytes, production phải set qua biến môi trường JWT_SECRET
    secret: ${JWT_SECRET:lexilearn-dev-secret-key-change-me-in-production-2026}
    access-token-ttl: 1800  # access token sống 30 phút (giây)
