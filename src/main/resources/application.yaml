server:
  port: 8080

spring:
  application:
    name: lexilearn-be

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lexilearn}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:thuunhat@gmail.com}
    password: ${MAIL_PASSWORD:xoeg mjlb gxbv kcdu}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  otp:
    length: 6
    max-sends-per-hour: 5   # chống spam OTP
    max-verify-attempts: 5  # chống brute-force OTP
