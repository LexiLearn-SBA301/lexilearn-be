<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>LexiLearn OTP</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f6f8; font-family: Arial, Helvetica, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f6f8; padding: 24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="480" cellpadding="0" cellspacing="0"
                   style="background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
                <!-- Header -->
                <tr>
                    <td style="background-color: #4f46e5; padding: 24px; text-align: center;">
                        <h1 style="margin: 0; color: #ffffff; font-size: 22px;">LexiLearn</h1>
                    </td>
                </tr>
                <!-- Body -->
                <tr>
                    <td style="padding: 32px 40px;">
                        <h2 style="margin: 0 0 16px; color: #111827; font-size: 18px;">Xác thực email của bạn</h2>
                        <p style="margin: 0 0 24px; color: #4b5563; font-size: 14px; line-height: 1.6;">
                            Cảm ơn bạn đã đăng ký LexiLearn. Dùng mã OTP bên dưới để hoàn tất xác thực:
                        </p>
                        <!-- OTP box -->
                        <div style="background-color: #f3f4f6; border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 24px;">
                            <span th:text="${otp}"
                                  style="font-size: 32px; font-weight: bold; letter-spacing: 10px; color: #4f46e5;">123456</span>
                        </div>
                        <p style="margin: 0 0 8px; color: #4b5563; font-size: 14px;">
                            Mã có hiệu lực trong <strong th:text="${ttlMinutes} + ' phút'">5 phút</strong>.
                        </p>
                        <p style="margin: 0; color: #9ca3af; font-size: 13px;">
                            Nếu bạn không yêu cầu mã này, hãy bỏ qua email.
                        </p>
                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td style="background-color: #f9fafb; padding: 16px; text-align: center;">
                        <p style="margin: 0; color: #9ca3af; font-size: 12px;">©Email tự động, vui lòng không trả lời.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
